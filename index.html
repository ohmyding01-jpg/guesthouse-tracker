<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Job Search System — Approval-based job search operating system for Samiha Chowdhury.">
    <meta name="theme-color" content="#1e3a5f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Job OS">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/vite.svg">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Job Search OS</title>
    <style>
      #app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #f9fafb;
        font-family: system-ui, sans-serif;
        color: #6b7280;
        font-size: 14px;
      }
      .noscript-message {
        padding: 40px;
        text-align: center;
        font-family: system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading fallback — replaced by React on mount -->
      <div id="app-loading">
        Loading Job Search OS…
      </div>
    </div>
    <noscript>
      <div class="noscript-message">
        JavaScript is required to run Job Search OS.
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register service worker for PWA installability
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function (err) {
            console.warn('SW registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
