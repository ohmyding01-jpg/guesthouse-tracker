[build]
  command = "npm ci && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  # VITE_DEMO_MODE is NOT set here so production deploys default to live mode.
  # For demo/preview deploys, set VITE_DEMO_MODE=true in Netlify UI or a deploy context.

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "nft"
  included_files = ["netlify/functions/_shared/**"]

[functions."ingest-scheduled"]
  schedule = "0 */2 * * *"

[functions."stale-scan-scheduled"]
  schedule = "0 8 * * *"
