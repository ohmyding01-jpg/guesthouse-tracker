[build]
  command = "npm install && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  # VITE_DEMO_MODE is NOT set here so production deploys default to live mode.
  # For demo/preview deploys, set VITE_DEMO_MODE=true in Netlify UI or a deploy context.

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/_shared/**"]
  # Increase timeout to 26 s (Netlify max) so that discovery runs against external
  # APIs (Greenhouse, Lever, USAJobs) don't time out under normal load.
  timeout = 26
