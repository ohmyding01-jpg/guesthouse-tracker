[build]
  command = "npm install && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  # VITE_DEMO_MODE is NOT set here so production deploys default to live mode.
  # For demo/preview deploys, set VITE_DEMO_MODE=true in Netlify UI or a deploy context.

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/_shared/**"]
  # NOTE: Netlify does not support a scalar `timeout` property under [functions].
  # Runtime timeout resilience must be handled in function/workflow design:
  #   - discoverJobsForSource uses AbortSignal.timeout(20000) per external fetch
  #   - trigger-discover proxies runDiscovery() server-side (no extra HTTP hop)
  #   - n8n/cron callers should set their own request timeout (recommended: 25s)
